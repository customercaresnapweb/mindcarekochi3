<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare Rx Generator | Secure</title>
    <meta name="robots" content="noindex, nofollow">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Manrope', 'sans-serif'], serif: ['Georgia', 'serif'] },
                    colors: { brand: { navy: '#0f172a', blue: '#2563eb', slate: '#475569' } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f8fafc; }
        .a4-print { width: 210mm; min-height: 297mm; background: white; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); margin: 0 auto; }
        @media print { .no-print { display: none !important; } body { background: white; } }
    </style>
</head>
<body class="text-brand-slate">

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-100 px-4 fixed inset-0 z-50 transition-opacity duration-300">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-200">
            <h1 class="text-2xl font-bold text-center mb-8">MindCare Secure Access</h1>
            <form id="login-form" class="space-y-6">
                <input type="password" id="pin-input" class="w-full px-4 py-4 rounded-xl border border-slate-300 text-center text-2xl font-bold" placeholder="••••" required>
                <button type="submit" class="w-full bg-brand-blue text-white font-bold py-4 rounded-xl">Unlock Portal</button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="min-h-screen bg-slate-100 p-4 lg:p-8 hidden">
        <div class="max-w-[1600px] mx-auto grid lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-4 bg-white p-6 rounded-3xl border border-slate-200 sticky top-8 no-print">
                <h2 class="text-xl font-bold mb-6">Rx Details</h2>
                <div class="space-y-4">
                    <input type="text" id="in-name" placeholder="Patient Name" class="w-full p-3 rounded-xl bg-slate-50 border">
                    <textarea id="in-medicines" rows="6" placeholder="Medicines" class="w-full p-3 rounded-xl bg-blue-50/50 border"></textarea>
                    
                    <button id="export-btn" onclick="generateImage()" class="w-full bg-brand-blue text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2">
                        Export as Image (PNG)
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8 overflow-x-auto pb-10">
                <div id="prescription-preview" class="a4-print flex flex-col relative bg-white overflow-hidden text-black font-sans p-12">
                    <h1 class="text-3xl font-bold">Dr. Abimanyu P.K</h1>
                    <p class="text-brand-blue">Consultant Psychiatrist</p>
                    <div class="my-8"><span id="out-name">__________________</span></div>
                    <div class="text-5xl text-brand-blue">℞</div>
                    <div class="mt-4"><p id="out-medicines" class="whitespace-pre-wrap font-bold"></p></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // PIN Logic
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (document.getElementById('pin-input').value === "4827") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
            }
        });

        // Data Binding
        document.getElementById('in-name').addEventListener('input', (e) => document.getElementById('out-name').innerText = e.target.value);
        document.getElementById('in-medicines').addEventListener('input', (e) => document.getElementById('out-medicines').innerText = e.target.value);

        // Updated Generate Image Logic
        function generateImage() {
            const btn = document.getElementById('export-btn');
            btn.innerText = "Generating...";
            
            html2canvas(document.getElementById('prescription-preview'), {
                scale: 2,
                useCORS: true,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Prescription_${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL("image/png", 1.0);
                link.click();
                btn.innerText = "Export as Image (PNG)";
            });
        }
    </script>
</body>
</html>
