<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindCare Rx Generator | Secure</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Manrope', 'sans-serif'] }, colors: { brand: { navy: '#0f172a', blue: '#2563eb', slate: '#475569' } } } } }
    </script>
    <style>
        body { background-color: #f8fafc; }
        .a4-print { width: 210mm; min-height: 297mm; background: white; margin: 0 auto; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="text-brand-slate">

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-100 px-4 fixed inset-0 z-50">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-200">
            <h1 class="text-2xl font-bold text-center text-brand-navy mb-8">MindCare Secure Access</h1>
            <form id="login-form" class="space-y-6">
                <input type="password" id="pin-input" class="w-full px-4 py-4 rounded-xl border text-center text-2xl font-bold tracking-[0.5em]" placeholder="••••" required autofocus>
                <button type="submit" class="w-full bg-brand-blue text-white font-bold py-4 rounded-xl">Unlock Portal</button>
            </form>
        </div>
    </div>

    <div id="app-screen" class="min-h-screen bg-slate-100 p-2 lg:p-8 hidden">
        <div class="max-w-[1600px] mx-auto grid lg:grid-cols-12 gap-4 lg:gap-8 items-start">
            
            <div class="w-full lg:col-span-4 bg-white p-4 lg:p-6 rounded-3xl shadow-sm border border-slate-200 lg:sticky lg:top-8 no-print">
                <h2 class="text-xl font-bold mb-6">Rx Details</h2>
                <div class="space-y-4">
                    <input type="text" id="in-name" placeholder="Patient Name" class="w-full p-3 rounded-xl border bg-slate-50">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="in-age" placeholder="Age" class="w-full p-3 rounded-xl border bg-slate-50">
                        <select id="in-sex" class="w-full p-3 rounded-xl border bg-slate-50">
                            <option value="">Sex</option><option value="Male">Male</option><option value="Female">Female</option>
                        </select>
                    </div>
                    <textarea id="in-complaints" placeholder="Complaints" class="w-full p-3 rounded-xl border bg-slate-50"></textarea>
                    <input type="text" id="in-diagnosis" placeholder="Diagnosis" class="w-full p-3 rounded-xl border bg-slate-50">
                    <textarea id="in-medicines" placeholder="Medicines (Rx)" rows="6" class="w-full p-3 rounded-xl border bg-blue-50"></textarea>
                    <textarea id="in-advice" placeholder="Advice" class="w-full p-3 rounded-xl border bg-slate-50"></textarea>
                    <button onclick="generateImage()" class="w-full bg-brand-blue text-white font-bold py-4 rounded-xl">Export High-Quality Image</button>
                </div>
            </div>

            <div class="w-full lg:col-span-8 flex justify-center pb-10 overflow-hidden">
                <div id="prescription-preview" class="a4-print flex flex-col relative bg-white overflow-hidden text-black font-sans w-full max-w-[210mm] scale-[0.6] lg:scale-100 origin-top p-12">
                    <div class="border-b-2 border-brand-blue flex justify-between items-end pb-6">
                        <div>
                            <h1 class="text-3xl font-extrabold text-brand-navy">Dr. Abimanyu P.K</h1>
                            <p class="text-brand-blue font-bold">Consultant Psychiatrist</p>
                            <p class="text-slate-500 text-sm">MBBS, MD (Psychiatry)</p>
                        </div>
                        <div class="text-right">
                            <img src="../public/logo.png" class="h-16 ml-auto mb-2" onerror="this.style.display='none'">
                            <p class="text-slate-500 text-sm">MindCare Psychiatry Clinic</p>
                        </div>
                    </div>
                    <div class="py-4 border-b text-sm font-semibold flex gap-8">
                        <p>Name: <span id="out-name">__________________</span></p>
                        <p>Age/Sex: <span id="out-agesex">___ / ___</span></p>
                    </div>
                    <div class="py-6 flex-1">
                        <p id="out-complaints" class="text-xs text-slate-400 italic"></p>
                        <p id="out-diagnosis" class="text-lg font-bold text-brand-blue mb-4"></p>
                        <div class="text-4xl text-brand-blue mb-4">℞</div>
                        <p id="out-medicines" class="text-lg font-bold whitespace-pre-wrap leading-relaxed"></p>
                        <p id="out-advice" class="text-sm mt-8 p-4 bg-slate-50 rounded-lg italic"></p>
                    </div>
                    <div class="flex justify-between items-end">
                        <p class="text-xs">MindCare Kochi | +91 6282360907</p>
                        <div class="text-center">
                            <img src="../public/seal.png" class="h-16 opacity-50" onerror="this.style.display='none'">
                            <img src="../public/sign.png" class="h-12" onerror="this.style.display='none'">
                            <p class="font-bold text-sm">Dr. Abimanyu P.K</p>
                            <p class="text-[10px]">REG NO: TCMC-68033</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if(document.getElementById('pin-input').value === "4827") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
            }
        });
        
        // Data binding
        const inputs = ['name', 'medicines', 'complaints', 'diagnosis', 'advice'];
        inputs.forEach(id => {
            document.getElementById(`in-${id}`).addEventListener('input', (e) => {
                document.getElementById(`out-${id}`).innerText = e.target.value;
            });
        });
        document.getElementById('in-age').addEventListener('input', updateAgeSex);
        document.getElementById('in-sex').addEventListener('change', updateAgeSex);
        
        function updateAgeSex() {
            document.getElementById('out-agesex').innerText = `${document.getElementById('in-age').value || '___'} / ${document.getElementById('in-sex').value || '___'}`;
        }
        
        // High-Quality Image Generation Logic
        function generateImage() {
            const element = document.getElementById('prescription-preview');
            
            html2canvas(element, {
                scale: 4, // Multiplies the resolution by 4 for extreme clarity
                useCORS: true, // Ensures your logos and signatures load properly
                onclone: function (clonedDoc) {
                    // Removes the mobile scale-down effect just for the snapshot, ensuring a full A4 sized image
                    const clonedElement = clonedDoc.getElementById('prescription-preview');
                    clonedElement.classList.remove('scale-[0.6]', 'lg:scale-100');
                }
            }).then(canvas => {
                // Convert the snapshot to a high-quality JPEG
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                
                // Trigger the download automatically
                const link = document.createElement('a');
                const patientName = document.getElementById('in-name').value || 'Patient';
                link.download = `Rx_${patientName}.jpg`;
                link.href = imgData;
                link.click();
            });
        }
    </script>
</body>
</html>
